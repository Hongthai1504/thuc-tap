<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internship E-commerce Store</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">MyStore</div>
      <div class="cart">Cart (<span id="cart-count">0</span>)</div>
    </header>

    <main>
      <h1>Latest Products</h1>
      <div id="product-list" class="grid-container">
        <p>Connecting to load data...</p>
      </div>

      <hr>

      <section class="checkout-section">
        <div class="cart-panel">
          <h2>Your Shopping Cart</h2>
          <ul id="cart-item">

          </ul>
          <h3> class="total"> Totla: $<span id="cart-total">0</span></h3>
        </div>

        <div class="checkout-form">
          <h2>Checkout Details</h2>
          <form id="order-form">
            <input type="next" id="shipping-address" placeholder="Enter shipping address" required>
            <button type="submit" class="btn-checkout">Place Order</button>
          </form>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
